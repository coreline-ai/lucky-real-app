name: ohaeng_guardians
description: "Ohaeng Guardians - daily five-element guardian, fortune, routine, and collection app."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  drift: ^2.34.1
  sqlite3: ^3.3.4
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  intl: ^0.20.3
  share_plus: ^13.2.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.34.2
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  # 실사용 런타임 WebP 파생본만 개별 등록한다.
  # PNG 원본과 imagegen source는 assets 문서/소스 보관용이며 번들 제외.
